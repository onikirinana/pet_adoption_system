{% extends "base.html" %}

{% block content %}
<section class="auth-modal-page">
    <div class="auth-modal-backdrop">
        <div class="auth-simple-modal">
            <a href="/" class="auth-modal-close">×</a>

            <div class="auth-simple-tabs">
                <a href="{{ url_for('login') }}" class="auth-simple-tab">Login</a>
                <a href="{{ url_for('register') }}" class="auth-simple-tab active">Register</a>
            </div>

            <form class="simple-register-form">
                <div class="simple-register-grid">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>

                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>

                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select gender</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Other">Other</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>

                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" placeholder="Enter age" min="1" required>

                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter email" required>

                    <label for="address">Address</label>
                    <input type="text" id="address" name="address" placeholder="Enter address" required>

                    <label for="experience">Experience</label>
                    <select id="experience" name="experience" required>
                        <option value="">Select experience</option>
                        <option value="Has pet care experience">Has pet care experience</option>
                        <option value="No pet care experience">No pet care experience</option>
                    </select>
                </div>

                <div class="auth-modal-actions">
                    <a href="/" class="auth-cancel-btn">Close</a>
                    <button type="submit" class="auth-submit-small">Register</button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
