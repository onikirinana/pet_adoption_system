{% extends "base.html" %}

{% block content %}
<section class="auth-modal-page">
    <div class="auth-modal-backdrop">
        <div class="auth-simple-modal">

            <!-- Close -->
            <a href="/" class="auth-modal-close">×</a>

            <!-- Tabs -->
            <div class="auth-simple-tabs">
                <a href="{{ url_for('login') }}" class="auth-simple-tab">Login</a>
                <a href="{{ url_for('register') }}" class="auth-simple-tab active">Register</a>
            </div>

            <!-- Register Form -->
            <form method="POST" action="/register" class="simple-register-form">

                <div class="simple-register-grid">

                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter username" required>

                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>

                    <label>Sex</label>
                    <select name="sex" required>
                        <option value="">Select gender</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Other">Other</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>

                    <label>Age</label>
                    <input type="number" name="age" placeholder="Enter age" min="1" required>

                    <label>Telephone</label>
                    <input type="text" name="telephone" placeholder="Enter phone number" required>

                    <label>Email</label>
                    <input type="email" name="email" placeholder="Enter email" required>

                    <label>Address</label>
                    <input type="text" name="address" placeholder="Enter address" required>

                    <label>Pic</label>
                    <input type="text" name="pic" placeholder="Enter profile image name">

                </div>

                <!-- Buttons -->
                <div class="auth-modal-actions">
                    <a href="/" class="auth-cancel-btn">Close</a>
                    <button type="submit" class="auth-submit-small">Register</button>
                </div>

            </form>

        </div>
    </div>
</section>
{% endblock %}
