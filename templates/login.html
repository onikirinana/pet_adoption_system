{% extends "base.html" %}

{% block content %}
<section class="auth-modal-page">
    <div class="auth-modal-backdrop">
        <div class="auth-simple-modal">
            <a href="/" class="auth-modal-close">×</a>

            <div class="auth-simple-tabs">
                <a href="{{ url_for('login') }}" class="auth-simple-tab active">Login</a>
                <a href="{{ url_for('register') }}" class="auth-simple-tab">Register</a>
            </div>

            <form class="simple-login-form" method="POST" action="/login">
                <div class="simple-login-row">
                    <label for="loginAccount">Account</label>
                    <input type="text" id="loginAccount" name="username" placeholder="Enter account" required>
                </div>

                <div class="simple-login-row">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" placeholder="Enter password" required>
                </div>

                <div class="auth-modal-actions">
                    <a href="/" class="auth-cancel-btn">Close</a>
                    <button type="submit" class="auth-submit-small">Login</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.querySelector(".simple-login-form").addEventListener("submit", function (e) {
            e.preventDefault();

            const formData = new FormData(this);

            fetch("/login", {
                method: "POST",
                body: formData
            })
                .then(res => res.json())
                .then(data => {

                    if (data.success) {
                        // ✅ 登录成功 → 跳主页
                        window.location.href = "/";
                    } else {
                        alert(data.msg);
                    }

                })
                .catch(err => {
                    console.log(err);
                    alert("Login failed");
                });
        });
    </script>
</section>
{% endblock %}
