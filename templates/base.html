<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="site-header">
        <div class="nav-container">
            <a class="logo" href="/">Pet Adoption System</a>

            <nav class="nav-links">
                <a href="/">Home</a>
                <a href="/knowledge">Pet Care</a>
                <a href="/adoption">Adoption Center</a>
                <a href="/team">Our Team</a>
            </nav>

            <div class="auth-buttons">
                {% if session.get('user_id') %}

                <div class="user-box">

                    <img src="https://ui-avatars.com/api/?name={{ session.get('username') }}" class="avatar">

                    <span>{{ session.get('username') }}</span>

                    <a href="/logout">Logout</a>

                </div>

                {% else %}

                <a href="{{ url_for('login') }}">Register / Login</a>

                {% endif %}
            </div>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Pet Adoption Management System. All rights reserved.</p>
    </footer>
</body>

</html>
