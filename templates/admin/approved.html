{% extends "admin/layout.html" %}

{% block content %}

<div class="card p-3">

    <h3>✅ Approved Adoption</h3>

    <table class="table table-bordered table-hover">

        <thead>
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Pet</th>
                <th>Message</th>
                <th>Apply Time</th>
                <th>Status</th>
            </tr>
        </thead>


        <tbody>

            {% for r in rows %}

            <tr>

                <td>{{ r.id }}</td>

                <td>{{ r.username }}</td>

                <td>{{ r.pet_name }}</td>

                <td>{{ r.message }}</td>

                <td>{{ r.apply_time }}</td>

                <td>
                    <span class="badge bg-success">
                        Approved
                    </span>
                </td>

            </tr>

            {% endfor %}

        </tbody>


    </table>

</div>

{% endblock %}
