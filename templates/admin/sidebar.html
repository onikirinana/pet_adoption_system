<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6fa;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #1f2430;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            padding: 18px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        /* SECTION HEADER (better than solid blue block) */
        .menu-section {
            margin: 18px 0 10px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: #a5b4fc;
            text-transform: uppercase;
            border-left: 3px solid #4f46e5;
        }

        /* MENU ITEM */
        .sidebar a {
            display: block;
            color: #cbd5e1;
            padding: 10px 12px;
            margin-bottom: 4px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .sidebar a:hover {
            background: rgba(79, 70, 229, 0.15);
            color: white;
            transform: translateX(3px);
        }

        /* ACTIVE STATE (you can use manually later) */
        .sidebar a.active {
            background: #4f46e5;
            color: white;
        }

        /* Main */
        .main {
            margin-left: 260px;
            padding: 22px;
        }

        .topbar {
            background: white;
            padding: 15px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            font-weight: 500;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="sidebar-title">🐾 Pet Adoption Admin</div>

        <div class="menu-section">Backend Management</div>

        <a href="/admin/users">👤 User Information</a>
        <a href="/admin/admins">🛠 Admin Information</a>
        <a href="/admin/pets">🐶 Pet Management</a>
        <a href="/admin/adopt">📦 Adoption Management</a>
        <a href="/admin/comments">💬 Comment Management</a>
        <a href="/admin/team">👥 Team Activities</a>
        <a href="/admin/apply">📝 Volunteer Applications</a>

        <div class="menu-section">Adoption Status</div>

        <a href="/admin/adopt/approved">✔ Approved Adoptions</a>
        <a href="/admin/adopt/rejected">❌ Rejected Adoptions</a>

    </div>

</body>

</html>
