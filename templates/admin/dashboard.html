<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f6fa;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #2f3542;
            color: white;
            position: fixed;
            top: 0;
            left: 0;
            padding: 15px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .menu-section {
            background: #3742fa;
            padding: 8px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 13px;
            font-weight: bold;
        }

        .sidebar a {
            display: block;
            color: #dcdde1;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #57606f;
            color: white;
        }

        /* Main content */
        .main {
            margin-left: 260px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <div class="sidebar-title">🐾 Pet Adoption Admin</div>

        <div class="menu-section">BACKEND MANAGEMENT</div>

        <a href="/admin/users">👤 User Information</a>
        <a href="/admin/admins">🛠 Admin Information</a>
        <a href="/admin/pets">🐶 Pet Management</a>
        <a href="/admin/adoption">📦 Adoption Management</a>
        <a href="/admin/comments">💬 Comment Management</a>
        <a href="/admin/team">👥 Team Activities</a>
        <a href="/admin/apply">📝 Volunteer Applications</a>

        <div class="menu-section">ADOPTION STATUS</div>

        <a href="/admin/adoption/approved">✔ Approved Adoptions</a>
        <a href="/admin/adoption/rejected">❌ Rejected Adoptions</a>

    </div>

    <!-- Main -->
    <div class="main">

        <div class="topbar">
            Welcome, Admin 👋
        </div>

        {% block content %}{% endblock %}

    </div>

</body>

</html>
